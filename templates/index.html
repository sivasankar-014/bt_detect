
<!DOCTYPE html>
<html>
<head>
    <title>Brain Tumor Detection</title>
</head>
<body>

    <h2>Brain Tumor Detection</h2>

    <style>

        /*  This is css used to style the html skeleton */
        body{
            font-family: Arial;
            background:#f5f5f5;
            text-align:center;
            margin-top:50px;
        }

        .container{
            width:400px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        input{
            margin:15px;
        }

        button{
            padding:10px 20px;
            background:blue;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        h2{
            color:green;
        }

    </style>

</head>
<body>
<div class="container">

    <form action="/predict" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <br><br>

        <button type="submit">Predict</button>

    </form>

       {% if prediction %}
        <h2>Prediction: {{ prediction }}</h2>
        <h3>Confidence: {{ confidence }}%</h3>
    {% endif %}


</body>
</html>
